<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>agent-slack support</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font: 16px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      main { width: min(560px, calc(100vw - 48px)); }
      h1 { margin: 0 0 12px; font-size: 24px; letter-spacing: 0; }
      p { color: #cfcfcf; }
      a { color: #fff; text-underline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Support</h1>
      <p>For bugs, setup help, and feature requests, open an issue on GitHub.</p>
      <p><a href="https://github.com/Newbie012/agent-slack/issues">github.com/Newbie012/agent-slack/issues</a></p>
    </main>
  </body>
</html>
